name: Vercel Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel environment to deploy
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
  push:
    branches:
      - main

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy CRM
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run backend tests
        run: npm test --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Verify Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=$DEPLOY_ENV --token=$VERCEL_TOKEN

      - name: Deploy preview
        if: env.DEPLOY_ENV == 'preview'
        run: npx vercel deploy --token=$VERCEL_TOKEN

      - name: Deploy production
        if: env.DEPLOY_ENV == 'production'
        run: npx vercel deploy --prod --token=$VERCEL_TOKEN
